name: Daily ManyChat SEO Run

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # This block is the secret sauce for fixing "Exit Code 1" permissions
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so push doesn't fail

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate SEO Pages
        run: python manychat-gen.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.github.io"
          git add .
          # The '|| true' ensures the workflow finishes even if no new pages were made
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily 20-page SEO injection" && git push origin main)
