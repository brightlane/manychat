name: Daily ManyChat SEO Run

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded to 3.11 for 2026 stability

      - name: List Files (Debug)
        run: ls -R # This will show us if keywords.txt is actually there

      - name: Generate SEO Pages
        run: |
          # If your script uses special libraries, we install them here
          # pip install requests lxml 
          python manychat-gen.py

      - name: Commit and Push
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.github.io"
          git add manychat/ manychat-sitemap.xml
          git diff --staged --quiet || (git commit -m "Auto-inject SEO pages" && git push origin main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
