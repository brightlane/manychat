name: manychat-run
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  seo-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Adding common SEO/web libraries just in case
          pip install lxml requests

      - name: Run Engine
        run: |
          # Create folder if it's missing to prevent Python IOErrors
          mkdir -p manychat
          python manychat-gen.py

      - name: Push Updates
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.github.io"
          git add manychat/ manychat-sitemap.xml sitemap.xml
          # The '|| true' keeps the workflow green even if no new files were added
          git commit -m "Automated SEO Injection 2026" && git push origin main || echo "No changes to commit"
