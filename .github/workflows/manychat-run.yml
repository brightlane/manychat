name: manychat-run
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  seo-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Engine
        continue-on-error: true
        run: |
          mkdir -p manychat
          python manychat-gen.py

      - name: Push Updates
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.github.io"
          git add .
          git diff --staged --quiet || (git commit -m "2026 Auto-Inject" && git push origin main)
