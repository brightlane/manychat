name: "ManyChat SEO Engine 2026"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual Trigger'
        required: false
        default: 'Forced Update'
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Generator
        run: python manychat-gen.py

      - name: Commit and Push
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.github.io"
          git add .
          git diff --staged --quiet || (git commit -m "Auto-update SEO pages" && git push origin main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
