        .vs-header { background: #0084ff; color: white; padding: 30px; border-radius: 12px; text-align: center; }
        .feature-table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        .feature-table td, .feature-table th { border: 1px solid #ddd; padding: 15px; }
        .cta { background: #ff3366; color: white; padding: 20px; text-align: center; border-radius: 8px; text-decoration: none; display: block; font-weight: bold; }
    </style>
</head>
<body>
    <div id="content">
        <h1 id="title">Loading Comparison...</h1>
        <div class="vs-header">
            <h2 id="vs-title">ManyChat vs. Competitor</h2>
        </div>
        
        <table class="feature-table">
            <thead><tr><th>Feature</th><th>ManyChat</th><th id="comp-name">Competitor</th></tr></thead>
