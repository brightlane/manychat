                <tr><td>Starting Price</td><td>$15</td><td>Varies</td></tr>
            </tbody>
        </table>

        <a href="https://manychat.partnerlinks.io/bbwxetk27f88-64kfxo" class="cta">GET MANYCHAT PRO DISCOUNT →</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vs = params.get('vs') || 'Competitor';
        const formattedVs = vs.charAt(0).toUpperCase() + vs.slice(1);
        
        document.getElementById('title').innerText = `ManyChat vs. ${formattedVs} (2026 Audit)`;
