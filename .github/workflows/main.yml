name: ManyChat Vulture 10K Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install fs-extra

      - name: 🌳 Plant the ManyChat Forest
        run: node generate-manychat-pages.js

      - name: 📡 Generate ManyChat Sitemap
        run: node sitemap-generator.js

      - name: 🚀 Force-Push Forest to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Vulture-Bot"
          git add .
          git commit -m "Vulture 10K: ManyChat Forest Sync" || echo "No changes"
          git push origin main --force

      - name: 🌐 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
