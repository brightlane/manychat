name: ManyChat Clean Factory

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Run clean generator
        run: node manychat-15k-factory-clean.js

      - name: Create .nojekyll
        run: touch .nojekyll

      - name: Commit generated site
        run: |
          git config user.name "Vulture Factory"
          git config user.email "vulture@brightlane.com"
          git add index.html sitemap.xml robots.txt site-clean .nojekyll
          git commit -m "Generate ManyChat clean site" || echo "No changes to commit"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
