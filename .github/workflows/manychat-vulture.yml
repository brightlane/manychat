name: "ManyChat Vulture 10K Builder"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Fires at 6:00 AM UTC

permissions:
  contents: write

jobs:
  vulture-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Build Descrambled Automation Pages
        run: python article-generator.py

      - name: 4. Heavy-Duty Conflict-Free Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage only the pages folder
          git add pages/*.html
          
          # Commit with timestamp
          git commit -m "ManyChat Vulture Sync: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          
          # Force sync with remote to break the "cannot lock ref" errors
          git fetch origin main
          git rebase origin/main
          
          # Push with fallback rebase
          git push origin main || (git pull --rebase origin main && git push origin main)
